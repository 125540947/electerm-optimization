<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>electerm-web 登录</title>
  <link rel="stylesheet" href="https://unpkg.com/antd@4.24.0/dist/antd.min.css">
  <style>
    :root {
      --bg-main: #1a1d23;
      --bg-secondary: #22262e;
      --accent: #4dabf7;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-main) 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    
    .login-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .form-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .form-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .form-input {
      padding: 12px 16px;
      background: #2a2f38;
      border: 1px solid #3c4043;
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.2);
    }
    
    .form-input::placeholder {
      color: #5f6368;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    .login-btn:hover {
      background: #3b8fd9;
      transform: translateY(-1px);
    }
    
    .login-btn:disabled {
      background: #5f6368;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-msg {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      border-radius: 8px;
      padding: 12px;
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
    }
    
    .success-msg {
      background: rgba(81, 207, 102, 0.1);
      border: 1px solid #51cf66;
      border-radius: 8px;
      padding: 12px;
      color: #51cf66;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">⚡ electerm-web</h1>
        <p class="login-subtitle">终端管理器</p>
      </div>
      
      <div id="errorMsg" style="display: none;"></div>
      <div id="successMsg" style="display: none;"></div>
      
      <form class="login-form" id="loginForm">
        <div class="form-item">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
        </div>
        
        <div class="form-item">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
        </div>
        
        <button type="submit" class="login-btn" id="submitBtn">登录</button>
      </form>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      
      if (!username || !password) {
        showError('请填写用户名和密码');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      try {
        // 尝试登录
        const response = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: username, password })
        });
        
        const result = await response.json();
        
        if (response.ok && result.success) {
          // 保存 token
          localStorage.setItem('electerm_token', result.token);
          localStorage.setItem('electerm_user', username);
          
          showSuccess('登录成功，正在跳转...');
          
          // 跳转
          setTimeout(() => {
            window.location.href = window.location.pathname;
          }, 1000);
        } else {
          // 如果登录失败，尝试注册
          const registerResponse = await fetch(`${API_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: username, password })
          });
          
          const registerResult = await registerResponse.json();
          
          if (registerResponse.ok && registerResult.success) {
            localStorage.setItem('electerm_token', registerResult.token);
            localStorage.setItem('electerm_user', username);
            
            showSuccess('注册成功，正在跳转...');
            setTimeout(() => {
              window.location.href = window.location.pathname;
            }, 1000);
          } else {
            showError(registerResult.error || result.error || '登录失败');
          }
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
        console.error(error);
      }
      
      submitBtn.disabled = false;
      submitBtn.textContent = '登录';
    });
    
    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.className = 'error-msg';
      errorMsg.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }
    
    function showSuccess(msg) {
      const successMsg = document.getElementById('successMsg');
      successMsg.textContent = msg;
      successMsg.className = 'success-msg';
      successMsg.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }
    
    // 检查是否已登录
    const token = localStorage.getItem('electerm_token');
    if (token) {
      // 已登录，跳转到主页
      window.location.href = window.location.pathname;
    }
  </script>
</body>
</html>
