# electerm-optimization Nginx 配置
# 复制到 nginx.conf 或 sites-available

upstream electerm_sync {
    server electerm-sync:3000;
}

upstream electerm_web {
    server electerm-web:5577;
}

server {
    listen 80;
    server_name _;

    # 静态文件 (如果有)
    # root /var/www/html;
    # index index.html;

    # Web 服务
    location / {
        proxy_pass http://electerm_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API 代理
    location /api/ {
        proxy_pass http://electerm_sync;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://electerm_sync/health;
        proxy_set_header Host $host;
    }
}

