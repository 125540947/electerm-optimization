version: '3.8'

services:
  electerm-sync:
    image: node:22-alpine
    container_name: electerm-sync-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/electerm-sync
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/sync"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - electerm-net

  # 可选: 反向代理 (需要配置 SSL 证书)
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: electerm-sync-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - electerm-sync
  #   networks:
  #     - electerm-net

networks:
  electerm-net:
    driver: bridge
